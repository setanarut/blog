<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Magnetic Pendulum</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #000;
            color: white;
            padding: 24px;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .main-view {
            flex-grow: 1;
            position: relative;
            background: #0a0a0a;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #000;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
        h1 { margin: 0 0 10px 0; font-size: 20px; color: #fff; letter-spacing: -0.5px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; }
        
        .dim-inputs { display: flex; gap: 10px; margin-bottom: 24px; }
        .dim-inputs div { flex: 1; }
        input[type="number"] {
            width: 100%;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        input[type="color"] {
            width: 100%;
            height: 36px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 24px;
            padding: 2px;
        }
        input[type="color"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        button {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
        }
        button:hover { background: #333; }
        .hint { font-size: 12px; opacity: 0.6; line-height: 1.6; margin-top: auto; border-top: 1px solid #222; padding-top: 20px; }
        .error-msg { color: #ff4444; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Magnetic Pendulum</h1>
        <p id="gpu-error" class="error-msg">WebGPU is not supported.</p>
        
        <div class="dim-inputs">
            <div>
                <label>Width (W)</label>
                <input type="number" id="wBox" value="512" min="100" max="2000">
            </div>
            <div>
                <label>Height (H)</label>
                <input type="number" id="hBox" value="512" min="100" max="2000">
            </div>
        </div>
        
        <div>
            <label>Magnet Color</label>
            <input type="color" id="magnetColor" disabled>
        </div>
        
        <button id="addMag">Add Magnet</button>
        <button id="toggleAnim">Hide Pendulum Animation</button>
        
        <div class="hint">
            • Change W & H to resize canvas.<br><br>
            • Click 'Add Magnet' to insert up to 16 magnets.<br><br>
            • Click a magnet to select & change color.<br><br>
            • <b>Right-click</b> on a magnet to delete it.<br><br>
            • Click empty space to launch pendulum.
        </div>
    </div>
    
    <div class="main-view">
        <div class="canvas-container" id="container">
            <canvas id="gpuCanvas"></canvas>
            <canvas id="uiCanvas"></canvas>
        </div>
    </div>

    <script type="module">
        const shaderSource = `
            struct Uniforms {
                res: vec2<f32>,
                magnetCount: u32,
                _pad: u32,
                magnets: array<vec4<f32>, 16>,
                colors: array<vec4<f32>, 16>,
            };
            @group(0) @binding(0) var<uniform> ui: Uniforms;

            struct VertexOutput {
                @builtin(position) pos: vec4<f32>,
                @location(0) uv: vec2<f32>,
            };

            @vertex
            fn vs_main(@builtin(vertex_index) idx: u32) -> VertexOutput {
                var pos = array<vec2<f32>, 4>(vec2(-1.0, -1.0), vec2(1.0, -1.0), vec2(-1.0, 1.0), vec2(1.0, 1.0));
                var out: VertexOutput;
                out.pos = vec4<f32>(pos[idx], 0.0, 1.0);
                out.uv = pos[idx];
                return out;
            }

            @fragment
            fn fs_main(in: VertexOutput) -> @location(0) vec4<f32> {
                let aspect = ui.res.x / ui.res.y;
                var coord = in.uv;
                if (aspect > 1.0) { coord.x *= aspect; } else { coord.y /= aspect; }
                
                var p = coord * 2.0;
                var v = vec2<f32>(0.0);
                let h = 0.25;
                let dt = 0.05;
                var settled = 0;
                var steps = 0.0;

                for (var i = 0; i < 300; i++) {
                    var f = -0.25 * p - 0.07 * v;
                    
                    for (var m = 0u; m < ui.magnetCount; m++) {
                        let mPos = ui.magnets[m].xy;
                        let d = pow(dot(p - mPos, p - mPos) + h*h, 1.5);
                        f += (mPos - p) / d;
                    }
                    
                    v += f * dt;
                    p += v * dt;
                    steps += 1.0;
                    
                    if (dot(v, v) < 0.001) {
                        for (var m = 0u; m < ui.magnetCount; m++) {
                            if (length(p - ui.magnets[m].xy) < 0.2) { 
                                settled = i32(m) + 1; 
                                break; 
                            }
                        }
                        if (settled > 0) { break; }
                    }
                }

                if (settled == 0 && ui.magnetCount > 0u) {
                    var minDist = 9999.0;
                    for (var m = 0u; m < ui.magnetCount; m++) {
                        let dist = length(p - ui.magnets[m].xy);
                        if (dist < minDist) {
                            minDist = dist;
                            settled = i32(m) + 1;
                        }
                    }
                }

                let shade = 0.4 + 0.6 * pow(1.0 - (steps / 300.0), 1.2);
                var col = vec3<f32>(0.0);
                if (settled > 0) {
                    col = ui.colors[settled - 1].rgb;
                }
                
                return vec4<f32>(col * shade, 1.0);
            }
        `;

        let magnets = [
            {x: 0, y: 0.6, c: [1.0, 0.2, 0.2]},
            {x: 0.5, y: -0.4, c: [0.2, 1.0, 0.2]},
            {x: -0.5, y: -0.4, c: [0.2, 0.2, 1.0]}
        ];
        
        let activePendulum = null;
        let draggingIdx = -1;
        let selectedIdx = -1;
        let needsUpdate = true;
        let showAnim = true;

        async function init() {
            if (!navigator.gpu) {
                document.getElementById('gpu-error').style.display = 'block';
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            const canvas = document.getElementById('gpuCanvas');
            const uiCanvas = document.getElementById('uiCanvas');
            const context = canvas.getContext('webgpu');
            const uctx = uiCanvas.getContext('2d');
            
            const wBox = document.getElementById('wBox');
            const hBox = document.getElementById('hBox');
            const colorPicker = document.getElementById('magnetColor');
            const toggleBtn = document.getElementById('toggleAnim');
            const addMagBtn = document.getElementById('addMag');

            const presentationFormat = navigator.gpu.getPreferredCanvasFormat();
            context.configure({ device, format: presentationFormat, alphaMode: 'premultiplied' });

            const shaderModule = device.createShaderModule({ code: shaderSource });
            const pipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: { module: shaderModule, entryPoint: 'vs_main' },
                fragment: {
                    module: shaderModule,
                    entryPoint: 'fs_main',
                    targets: [{ format: presentationFormat }]
                },
                primitive: { topology: 'triangle-strip' }
            });

            const uniformBuffer = device.createBuffer({
                size: 528, 
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
            });

            const bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
            });

            function updateSize() {
                const w = parseInt(wBox.value) || 512;
                const h = parseInt(hBox.value) || 512;
                
                const container = document.getElementById('container');
                container.style.width = w + 'px';
                container.style.height = h + 'px';
                
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                
                uiCanvas.width = w;
                uiCanvas.height = h;
                uiCanvas.style.width = w + 'px';
                uiCanvas.style.height = h + 'px';
                
                needsUpdate = true;
            }

            wBox.addEventListener('change', updateSize);
            hBox.addEventListener('change', updateSize);
            
            toggleBtn.addEventListener('click', () => {
                showAnim = !showAnim;
                toggleBtn.innerText = showAnim ? "Hide Pendulum Animation" : "Show Pendulum Animation";
            });

            addMagBtn.addEventListener('click', () => {
                if (magnets.length >= 16) return;
                const rc = () => Math.random() * 0.8 + 0.2;
                magnets.push({ x: 0, y: 0, c: [rc(), rc(), rc()] });
                needsUpdate = true;
            });

            function rgbToHex(c) {
                const r = Math.round(c[0] * 255).toString(16).padStart(2, '0');
                const g = Math.round(c[1] * 255).toString(16).padStart(2, '0');
                const b = Math.round(c[2] * 255).toString(16).padStart(2, '0');
                return `#${r}${g}${b}`;
            }

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16) / 255;
                const g = parseInt(hex.slice(3, 5), 16) / 255;
                const b = parseInt(hex.slice(5, 7), 16) / 255;
                return [r, g, b];
            }

            colorPicker.addEventListener('input', (e) => {
                if (selectedIdx !== -1 && magnets[selectedIdx]) {
                    magnets[selectedIdx].c = hexToRgb(e.target.value);
                    needsUpdate = true;
                }
            });

            updateSize();

            // FIX: getMousePos — shader p-space = uv * aspect * 2
            // So x ∈ [-2*aspect, 2*aspect], y ∈ [-2, 2] (for aspect >= 1)
            function getMousePos(e) {
                const rect = uiCanvas.getBoundingClientRect();
                const aspect = canvas.width / canvas.height;
                const uvx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const uvy = 1 - ((e.clientY - rect.top) / rect.height) * 2;
                if (aspect > 1.0) {
                    return { x: uvx * aspect * 2, y: uvy * 2 };
                } else {
                    return { x: uvx * 2, y: uvy / aspect * 2 };
                }
            }

            // FIX: screenToWorld — inverse of getMousePos
            // Converts p-space (magnet coords) → canvas pixel coords
            function screenToWorld(wx, wy) {
                const aspect = canvas.width / canvas.height;
                if (aspect > 1.0) {
                    return {
                        x: (wx / (aspect * 2) + 1) * canvas.width / 2,
                        y: (1 - (wy / 2 + 1) / 2) * canvas.height
                    };
                } else {
                    return {
                        x: (wx / 2 + 1) * canvas.width / 2,
                        y: (1 - (wy * aspect / 2 + 1) / 2) * canvas.height
                    };
                }
            }

            uiCanvas.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; 
                const m = getMousePos(e);
                let hit = -1;
                magnets.forEach((mag, i) => {
                    if (Math.hypot(mag.x - m.x, mag.y - m.y) < 0.15) hit = i;
                });

                if (hit !== -1) { 
                    draggingIdx = hit; 
                    selectedIdx = hit;
                    colorPicker.value = rgbToHex(magnets[hit].c);
                    colorPicker.disabled = false;
                } else {
                    selectedIdx = -1;
                    colorPicker.disabled = true;
                    activePendulum = {
                        p: { x: m.x, y: m.y },
                        v: { x: 0, y: 0 },
                        trail: [{ x: m.x, y: m.y }]
                    };
                }
            });

            uiCanvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const m = getMousePos(e);
                let hit = -1;
                magnets.forEach((mag, i) => {
                    if (Math.hypot(mag.x - m.x, mag.y - m.y) < 0.15) hit = i;
                });
                
                if (hit !== -1 && magnets.length > 1) {
                    magnets.splice(hit, 1);
                    if (selectedIdx === hit) {
                        selectedIdx = -1;
                        colorPicker.disabled = true;
                    } else if (selectedIdx > hit) {
                        selectedIdx--;
                    }
                    needsUpdate = true;
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (draggingIdx !== -1) {
                    const m = getMousePos(e);
                    magnets[draggingIdx].x = m.x;
                    magnets[draggingIdx].y = m.y;
                    needsUpdate = true;
                }
            });
            window.addEventListener('mouseup', () => draggingIdx = -1);

            function drawBackground() {
                if (!needsUpdate) return;
                
                const uniformData = new ArrayBuffer(528);
                const floatView = new Float32Array(uniformData);
                const uintView = new Uint32Array(uniformData);

                floatView[0] = canvas.width;
                floatView[1] = canvas.height;
                uintView[2] = magnets.length;
                
                for (let i = 0; i < magnets.length; i++) {
                    floatView[4 + i * 4] = magnets[i].x;
                    floatView[4 + i * 4 + 1] = magnets[i].y;
                    
                    floatView[68 + i * 4] = magnets[i].c[0];
                    floatView[68 + i * 4 + 1] = magnets[i].c[1];
                    floatView[68 + i * 4 + 2] = magnets[i].c[2];
                    floatView[68 + i * 4 + 3] = 1.0;
                }

                device.queue.writeBuffer(uniformBuffer, 0, uniformData);

                const commandEncoder = device.createCommandEncoder();
                const passEncoder = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: { r: 0, g: 0, b: 0, a: 1 },
                        loadOp: 'clear',
                        storeOp: 'store'
                    }]
                });
                passEncoder.setPipeline(pipeline);
                passEncoder.setBindGroup(0, bindGroup);
                passEncoder.draw(4);
                passEncoder.end();
                device.queue.submit([commandEncoder.finish()]);
                needsUpdate = false;
            }

            function updatePhysics() {
                if (!activePendulum) return;
                const p = activePendulum;
                const dt = 0.05;
                const h = 0.25;

                let fx = -0.25 * p.p.x - 0.07 * p.v.x;
                let fy = -0.25 * p.p.y - 0.07 * p.v.y;

                magnets.forEach(m => {
                    const dx = m.x - p.p.x;
                    const dy = m.y - p.p.y;
                    const d = Math.pow(dx*dx + dy*dy + h*h, 1.5);
                    fx += dx / d;
                    fy += dy / d;
                });

                p.v.x += fx * dt;
                p.v.y += fy * dt;
                p.p.x += p.v.x * dt;
                p.p.y += p.v.y * dt;
                p.trail.push({x: p.p.x, y: p.p.y});
                if (p.trail.length > 100) p.trail.shift();

                if (p.v.x*p.v.x + p.v.y*p.v.y < 0.001) {
                    magnets.forEach(m => {
                        if (Math.hypot(m.x - p.p.x, m.y - p.p.y) < 0.15) activePendulum = null;
                    });
                }
            }

            function drawUI() {
                uctx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);

                magnets.forEach((m, i) => {
                    const pos = screenToWorld(m.x, m.y);
                    uctx.fillStyle = `rgb(${m.c[0]*255}, ${m.c[1]*255}, ${m.c[2]*255})`;
                    uctx.beginPath();
                    uctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
                    uctx.fill();
                    
                    if (i === selectedIdx) {
                        uctx.strokeStyle = '#ff0';
                        uctx.lineWidth = 3;
                    } else {
                        uctx.strokeStyle = '#fff';
                        uctx.lineWidth = 2;
                    }
                    uctx.stroke();
                });

                if (showAnim && activePendulum) {
                    uctx.beginPath();
                    uctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    uctx.lineWidth = 2;
                    const start = screenToWorld(activePendulum.trail[0].x, activePendulum.trail[0].y);
                    uctx.moveTo(start.x, start.y);
                    activePendulum.trail.forEach(pt => {
                        const pos = screenToWorld(pt.x, pt.y);
                        uctx.lineTo(pos.x, pos.y);
                    });
                    uctx.stroke();

                    const head = screenToWorld(activePendulum.p.x, activePendulum.p.y);
                    uctx.fillStyle = '#fff';
                    uctx.beginPath();
                    uctx.arc(head.x, head.y, 5, 0, Math.PI * 2);
                    uctx.fill();
                }
            }

            function frame() {
                drawBackground();
                updatePhysics();
                drawUI();
                requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);
        }

        init();
    </script>
</body>
</html>
