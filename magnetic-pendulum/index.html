<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Magnetic Pendulum</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #000;
            color: white;
            padding: 24px;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .main-view {
            flex-grow: 1;
            position: relative;
            background: #0a0a0a;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #000;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
        h1 { margin: 0 0 10px 0; font-size: 20px; color: #fff; letter-spacing: -0.5px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: pointer; margin-bottom: 24px; accent-color: #444; }
        button {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        button:hover { background: #333; }
        .hint { font-size: 12px; opacity: 0.6; line-height: 1.6; margin-top: auto; border-top: 1px solid #222; padding-top: 20px; }
        .error-msg { color: #ff4444; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Magnetic Pendulum</h1>
        <p id="gpu-error" class="error-msg">WebGPU is not supported.</p>
        
        <label id="resLabel">Resolution: 512x512</label>
        <input type="range" id="resSlider" min="128" max="1024" value="512" step="1">
        
        <button id="toggleAnim">Hide Pendulum Animation</button>
        
        <div class="hint">
            • Shader only runs once when magnets move.<br><br>
            • Pendulum is drawn on a separate 2D canvas.<br><br>
            • Click to launch pendulum.
        </div>
    </div>
    
    <div class="main-view">
        <div class="canvas-container" id="container">
            <canvas id="gpuCanvas"></canvas>
            <canvas id="uiCanvas"></canvas>
        </div>
    </div>

    <script type="module">
        const shaderSource = `
            struct Uniforms {
                res: vec2<f32>,
                m1: vec2<f32>,
                m2: vec2<f32>,
                m3: vec2<f32>,
            };
            @group(0) @binding(0) var<uniform> ui: Uniforms;

            struct VertexOutput {
                @builtin(position) pos: vec4<f32>,
                @location(0) uv: vec2<f32>,
            };

            @vertex
            fn vs_main(@builtin(vertex_index) idx: u32) -> VertexOutput {
                var pos = array<vec2<f32>, 4>(vec2(-1.0, -1.0), vec2(1.0, -1.0), vec2(-1.0, 1.0), vec2(1.0, 1.0));
                var out: VertexOutput;
                out.pos = vec4<f32>(pos[idx], 0.0, 1.0);
                out.uv = pos[idx];
                return out;
            }

            @fragment
            fn fs_main(in: VertexOutput) -> @location(0) vec4<f32> {
                let aspect = ui.res.x / ui.res.y;
                var coord = in.uv;
                if (aspect > 1.0) { coord.x *= aspect; } else { coord.y /= aspect; }
                
                var p = coord * 2.0;
                var v = vec2<f32>(0.0);
                let h = 0.25;
                let dt = 0.05;
                var settled = 0;
                var steps = 0.0;

                for (var i = 0; i < 300; i++) {
                    let f_friction = -0.25 * p - 0.07 * v;
                    let d1 = pow(dot(p - ui.m1, p - ui.m1) + h*h, 1.5);
                    let d2 = pow(dot(p - ui.m2, p - ui.m2) + h*h, 1.5);
                    let d3 = pow(dot(p - ui.m3, p - ui.m3) + h*h, 1.5);
                    let f = f_friction + (ui.m1 - p)/d1 + (ui.m2 - p)/d2 + (ui.m3 - p)/d3;
                    v += f * dt;
                    p += v * dt;
                    steps += 1.0;
                    if (dot(v, v) < 0.001) {
                        if (length(p - ui.m1) < 0.2) { settled = 1; break; }
                        if (length(p - ui.m2) < 0.2) { settled = 2; break; }
                        if (length(p - ui.m3) < 0.2) { settled = 3; break; }
                    }
                }

                if (settled == 0) {
                    let dists = vec3<f32>(length(p - ui.m1), length(p - ui.m2), length(p - ui.m3));
                    if (dists.x < dists.y && dists.x < dists.z) { settled = 1; }
                    else if (dists.y < dists.x && dists.y < dists.z) { settled = 2; }
                    else { settled = 3; }
                }

                let shade = 0.4 + 0.6 * pow(1.0 - (steps / 300.0), 1.2);
                var col: vec3<f32>;
                if (settled == 1) { col = vec3(1.0, 0.2, 0.2); }
                else if (settled == 2) { col = vec3(0.2, 1.0, 0.2); }
                else { col = vec3(0.2, 0.2, 1.0); }
                return vec4<f32>(col * shade, 1.0);
            }
        `;

        let magnets = [{x: 0, y: 0.6}, {x: 0.5, y: -0.4}, {x: -0.5, y: -0.4}];
        let activePendulum = null;
        let draggingIdx = -1;
        let needsUpdate = true;
        let showAnim = true;

        async function init() {
            if (!navigator.gpu) {
                document.getElementById('gpu-error').style.display = 'block';
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            const canvas = document.getElementById('gpuCanvas');
            const uiCanvas = document.getElementById('uiCanvas');
            const context = canvas.getContext('webgpu');
            const uctx = uiCanvas.getContext('2d');
            const resSlider = document.getElementById('resSlider');
            const toggleBtn = document.getElementById('toggleAnim');

            const presentationFormat = navigator.gpu.getPreferredCanvasFormat();
            context.configure({ device, format: presentationFormat, alphaMode: 'premultiplied' });

            const shaderModule = device.createShaderModule({ code: shaderSource });
            const pipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: { module: shaderModule, entryPoint: 'vs_main' },
                fragment: {
                    module: shaderModule,
                    entryPoint: 'fs_main',
                    targets: [{ format: presentationFormat }]
                },
                primitive: { topology: 'triangle-strip' }
            });

            const uniformBuffer = device.createBuffer({
                size: 64,
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
            });

            const bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
            });

            function updateSize() {
                const val = parseInt(resSlider.value);
                const container = document.getElementById('container');
                container.style.width = val + 'px';
                container.style.height = val + 'px';
                
                canvas.width = val;
                canvas.height = val;
                canvas.style.width = val + 'px';
                canvas.style.height = val + 'px';
                
                uiCanvas.width = val;
                uiCanvas.height = val;
                uiCanvas.style.width = val + 'px';
                uiCanvas.style.height = val + 'px';
                
                document.getElementById('resLabel').innerText = `Resolution: ${val}x${val}`;
                needsUpdate = true;
            }

            resSlider.addEventListener('input', updateSize);
            toggleBtn.addEventListener('click', () => {
                showAnim = !showAnim;
                toggleBtn.innerText = showAnim ? "Hide Pendulum Animation" : "Show Pendulum Animation";
            });
            updateSize();

            function getMousePos(e) {
                const rect = uiCanvas.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const y = (1 - (e.clientY - rect.top) / rect.height) * 2 - 1;
                return { x, y };
            }

            uiCanvas.addEventListener('mousedown', (e) => {
                const m = getMousePos(e);
                let hit = -1;
                magnets.forEach((mag, i) => {
                    if (Math.hypot(mag.x - m.x, mag.y - m.y) < 0.15) hit = i;
                });

                if (hit !== -1) { 
                    draggingIdx = hit; 
                } else {
                    activePendulum = {
                        p: { x: m.x, y: m.y },
                        v: { x: 0, y: 0 },
                        trail: [{ x: m.x, y: m.y }]
                    };
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (draggingIdx !== -1) {
                    const m = getMousePos(e);
                    magnets[draggingIdx] = { x: m.x, y: m.y };
                    needsUpdate = true;
                }
            });
            window.addEventListener('mouseup', () => draggingIdx = -1);

            function drawBackground() {
                if (!needsUpdate) return;
                const uniformData = new Float32Array([
                    canvas.width, canvas.height,
                    magnets[0].x, magnets[0].y,
                    magnets[1].x, magnets[1].y,
                    magnets[2].x, magnets[2].y,
                ]);
                device.queue.writeBuffer(uniformBuffer, 0, uniformData);

                const commandEncoder = device.createCommandEncoder();
                const passEncoder = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: { r: 0, g: 0, b: 0, a: 1 },
                        loadOp: 'clear',
                        storeOp: 'store'
                    }]
                });
                passEncoder.setPipeline(pipeline);
                passEncoder.setBindGroup(0, bindGroup);
                passEncoder.draw(4);
                passEncoder.end();
                device.queue.submit([commandEncoder.finish()]);
                needsUpdate = false;
            }

            function updatePhysics() {
                if (!activePendulum) return;
                const p = activePendulum;
                const dt = 0.05;
                const h = 0.25;

                let fx = -0.25 * p.p.x - 0.07 * p.v.x;
                let fy = -0.25 * p.p.y - 0.07 * p.v.y;

                magnets.forEach(m => {
                    const dx = m.x - p.p.x;
                    const dy = m.y - p.p.y;
                    const d = Math.pow(dx*dx + dy*dy + h*h, 1.5);
                    fx += dx / d;
                    fy += dy / d;
                });

                p.v.x += fx * dt;
                p.v.y += fy * dt;
                p.p.x += p.v.x * dt;
                p.p.y += p.v.y * dt;
                p.trail.push({x: p.p.x, y: p.p.y});
                if (p.trail.length > 100) p.trail.shift();

                if (p.v.x*p.v.x + p.v.y*p.v.y < 0.001) {
                    magnets.forEach(m => {
                        if (Math.hypot(m.x - p.p.x, m.y - p.p.y) < 0.15) activePendulum = null;
                    });
                }
            }

            function drawUI() {
                uctx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                const w = uiCanvas.width;
                const h = uiCanvas.height;
                const toScreen = (wx, wy) => ({ x: (wx + 1) * 0.5 * w, y: (1 - (wy + 1) * 0.5) * h });

                const colors = ['#ff4b2b', '#1d976c', '#2193b0'];
                magnets.forEach((m, i) => {
                    const pos = toScreen(m.x, m.y);
                    uctx.fillStyle = colors[i];
                    uctx.beginPath();
                    uctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
                    uctx.fill();
                    uctx.strokeStyle = '#fff';
                    uctx.lineWidth = 2;
                    uctx.stroke();
                });

                if (showAnim && activePendulum) {
                    uctx.beginPath();
                    uctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    uctx.lineWidth = 2;
                    const start = toScreen(activePendulum.trail[0].x, activePendulum.trail[0].y);
                    uctx.moveTo(start.x, start.y);
                    activePendulum.trail.forEach(pt => {
                        const pos = toScreen(pt.x, pt.y);
                        uctx.lineTo(pos.x, pos.y);
                    });
                    uctx.stroke();

                    const head = toScreen(activePendulum.p.x, activePendulum.p.y);
                    uctx.fillStyle = '#fff';
                    uctx.beginPath();
                    uctx.arc(head.x, head.y, 5, 0, Math.PI * 2);
                    uctx.fill();
                }
            }

            function frame() {
                drawBackground();
                updatePhysics();
                drawUI();
                requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);
        }

        init();
    </script>
</body>
</html>
